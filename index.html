<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeremy Song – Michelin Star Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="style.css">

  <style>
    /* Dynamic touches (delete any block you don't like) */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: none; }
    }
    .reveal {
      opacity: 0;
      animation: fadeUp 0.7s ease forwards;
      animation-delay: var(--d, 0s);
    }
    .signoff { font-style: italic; letter-spacing: 0.04em; }
    @media (prefers-reduced-motion: reduce) {
      .reveal { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <script src="nav.js"></script>

  <div class="container no-background">
    <h1>About Me</h1>
    <p>Hi! I’m a senior at Northwestern University double majoring in Data Science and Statistics, interested in business strategy, operations, and technology. This website is a passion project.</p>
    <p class="signoff">Hope you enjoy!</p>
  </div>

  <script>
    // staggered reveal: heading first, then each paragraph
    document.querySelectorAll('.container h1, .container p').forEach((el, i) => {
      el.classList.add('reveal');
      el.style.setProperty('--d', (i * 0.12) + 's');
    });
  </script>
</body>
</html>
